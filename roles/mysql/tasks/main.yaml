- name: install mysql server 
  package: 
    name: mysql-server
    state: present
- name: install boto3 botocore
  pip:
    name:
    - boto3
    - botocore
    executable: pip3.9
- name: start and enable
  service:
    name: mysqld
    state: started
    enabled: yes
- name: setup root password
  #command: mysql_secure_installation --set-root-pass "{{ MYSQL_ROOT_PASSWORD }}"
  command: mysql_secure_installation --set-root-pass "{{ root_password.mysql_root_password }}"